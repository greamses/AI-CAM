<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aperture // AI Camera</title>
  
  <!-- PWA META -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <!-- Premium UI Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* ----- RESET & BASE ----- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #000000;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
      width: 100vw;
      color: #ffffff;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }
    
    .app { display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; }
    
    .camera-stage { flex: 1; position: relative; background: #000000; overflow: hidden; }
    
    .camera-viewport { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
    
    #webcam { width: 100%; height: 100%; object-fit: cover; display: block; transform: scaleX(-1); transition: transform 0.1s linear; }
    
    #overlayCanvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; transform: scaleX(-1); }
    
    /* ----- CINEMATIC VIEWFINDER BRACKETS ----- */
    .viewfinder { position: absolute; inset: 24px; pointer-events: none; z-index: 10; border: 1px solid rgba(255, 255, 255, 0.05); }
    .vf-corner { position: absolute; width: 32px; height: 32px; border-color: rgba(255, 255, 255, 0.4); border-style: solid; transition: border-color 0.3s; }
    .vf-tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .vf-tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .vf-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
    .vf-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
    
    /* ----- FLASH ANIMATION ----- */
    #flash-overlay { position: absolute; inset: 0; background: #ffffff; z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
    #flash-overlay.active { opacity: 1; transition: opacity 0.05s ease-out; }
    
    /* ----- TOP HUD ----- */
    .top-hud { position: absolute; top: 36px; left: 36px; right: 36px; display: flex; justify-content: space-between; align-items: center; z-index: 25; pointer-events: none; }
    
    .glass-panel {
      pointer-events: auto; background: rgba(15, 15, 20, 0.4); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 100px; padding: 10px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .brand { font-weight: 700; font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase; color: #ffffff; }
    .brand svg { width: 20px; height: 20px; stroke: #ffffff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    
    .status-group { display: flex; align-items: center; gap: 10px; }
    
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4b5563; transition: all 0.3s ease; }
    .status-dot.active { background: #10b981; box-shadow: 0 0 12px rgba(16, 185, 129, 0.6); }
    .status-dot.warning { background: #f59e0b; box-shadow: 0 0 12px rgba(245, 158, 11, 0.6); }
    .status-dot.alert { background: #ef4444; box-shadow: 0 0 12px rgba(239, 68, 68, 0.6); }
    .status-dot.standby { background: #9ca3af; box-shadow: 0 0 12px rgba(156, 163, 175, 0.4); }
    
    #gestureLabel { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #e5e7eb; font-variant-numeric: tabular-nums; }
    
    .mic-icon { font-size: 14px; opacity: 0.3; transition: opacity 0.3s; }
    .mic-icon.listening { opacity: 1; text-shadow: 0 0 8px rgba(255,255,255,0.8); }

    /* ----- BOTTOM GALLERY DOCK ----- */
    .gallery-dock {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); max-width: calc(100vw - 72px); z-index: 25;
      display: flex; gap: 16px; padding: 12px; border-radius: 24px; background: rgba(15, 15, 20, 0.3); backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); overflow-x: auto; scrollbar-width: none; pointer-events: auto;
    }
    .gallery-dock::-webkit-scrollbar { display: none; }
    .gallery-dock:empty { display: none; }
    
    .snapshot-item { position: relative; flex: 0 0 auto; width: 72px; height: 72px; border-radius: 14px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.15); transition: all 0.3s; background: #000; }
    .snapshot-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .snapshot-item:hover { transform: translateY(-4px); border-color: rgba(255, 255, 255, 0.6); box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4); }
    .snapshot-item:hover img { transform: scale(1.1); }
    
    .download-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .snapshot-item:hover .download-overlay { opacity: 1; }
    .download-overlay svg { width: 24px; height: 24px; stroke: #ffffff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    
    /* ----- LOADER ----- */
    #loader { position: fixed; inset: 0; background: #000000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; gap: 24px; }
    .spinner-svg { width: 48px; height: 48px; animation: spin 2s linear infinite; stroke: #ffffff; fill: none; stroke-width: 2; stroke-dasharray: 90 150; stroke-dashoffset: 0; stroke-linecap: round; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    #loaderText { font-size: 16px; font-weight: 600; letter-spacing: 0.15em; color: #ffffff; text-transform: uppercase; margin-bottom: 8px; }
    #loaderSubtext { font-size: 12px; font-weight: 500; color: #9ca3af; letter-spacing: 0.05em; }
    #startBtn { display: none; margin-top: 20px; background: #ffffff; color: #000000; border: none; padding: 12px 24px; border-radius: 100px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: transform 0.2s; }
    #startBtn:active { transform: scale(0.95); }
    
    @media (max-width: 600px) {
      .viewfinder { inset: 16px; }
      .top-hud { top: 24px; left: 16px; right: 16px; flex-direction: column; gap: 12px; align-items: flex-start; }
      .gallery-dock { bottom: 24px; padding: 10px; border-radius: 20px; max-width: calc(100vw - 32px); }
      .snapshot-item { width: 64px; height: 64px; }
    }
  </style>
</head>

<body>
  
  <div id="loader">
    <svg class="spinner-svg" id="spinner" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20"></circle></svg>
    <div style="text-align: center;">
      <div id="loaderText">Initializing Sensors</div>
      <div id="loaderSubtext">Connecting to ML Nodes...</div>
      <button id="startBtn">Tap to Activate</button>
    </div>
  </div>
  
  <div class="app">
    <div class="camera-stage">
      <div class="viewfinder" id="viewfinder">
        <div class="vf-corner vf-tl"></div><div class="vf-corner vf-tr"></div>
        <div class="vf-corner vf-bl"></div><div class="vf-corner vf-br"></div>
      </div>
      
      <div class="camera-viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlayCanvas"></canvas>
        <div id="flash-overlay"></div>
        <div class="gallery-dock" id="galleryContainer"></div>
        
        <div class="top-hud">
          <div class="glass-panel brand">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line></svg>
            APERTURE
          </div>
          <div class="glass-panel status-group">
            <span class="status-dot" id="statusDot"></span>
            <span id="gestureLabel">Booting...</span>
            <span class="mic-icon" id="micIcon">🎙️</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script type="module">
    import { FaceLandmarker, HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.19/vision_bundle.mjs";
    
    const video = document.getElementById('webcam');
    const gallery = document.getElementById('galleryContainer');
    const flash = document.getElementById('flash-overlay');
    const statusDot = document.getElementById('statusDot');
    const gestureLabel = document.getElementById('gestureLabel');
    const micIcon = document.getElementById('micIcon');
    const loader = document.getElementById('loader');
    const vfCorners = document.querySelectorAll('.vf-corner');
    
    let faceLandmarker = null;
    let handLandmarker = null;
    let lastVideoTime = -1;
    let isShutterCooldown = false;
    let currentZoom = 1.0;
    let targetZoom = 1.0;
    
    // Core States: 'STANDBY', 'COUNTDOWN', 'ARMED'
    let cameraState = 'STANDBY'; 
    let countdownStart = 0;
    let pitchHistory = [];
    
    // --- 1. SENSITIVE NOD DETECTION (Time-series Velocity) ---
    function detectNod(landmarks) {
      if (!landmarks || landmarks.length === 0) return false;
      const top = landmarks[10];     // Top of head
      const bottom = landmarks[152]; // Chin
      const nose = landmarks[1];     // Tip of nose
      
      const faceHeight = Math.hypot(top.x - bottom.x, top.y - bottom.y);
      if (faceHeight === 0) return false;
      
      // Normalized Y removes distance bias (works close or far)
      const normY = (nose.y - top.y) / faceHeight;
      const now = Date.now();
      
      pitchHistory.push({ time: now, y: normY });
      // Keep only last 400ms of movement
      pitchHistory = pitchHistory.filter(p => now - p.time < 400);
      
      if (pitchHistory.length < 5) return false;
      
      const minY = Math.min(...pitchHistory.map(p => p.y));
      const maxY = Math.max(...pitchHistory.map(p => p.y));
      
      // Threshold: 0.025 (highly sensitive to small rapid vertical dips)
      if (maxY - minY > 0.025) {
        const latestY = pitchHistory[pitchHistory.length - 1].y;
        // Verify head came back UP after dipping down
        if (latestY < minY + (maxY - minY) * 0.4) {
          pitchHistory = []; // Prevent double-triggering
          return true;
        }
      }
      return false;
    }
    
    // --- 2. FINGER COUNTING (State Controls) ---
    function getFingersUpCount(landmarks) {
      if (!landmarks || landmarks.length === 0) return 'NONE';
      const lm = landmarks[0];
      
      // Compare fingertip Y against lower joint (PIP) Y
      const isUp = (tip, pip) => lm[tip].y < lm[pip].y;
      
      const index = isUp(8, 6);
      const middle = isUp(12, 10);
      const ring = isUp(16, 14);
      const pinky = isUp(20, 18);
      
      if (index && middle && !ring && !pinky) return 'TWO';
      if (index && middle && ring && !pinky) return 'THREE';
      
      // Allow pinch zoom if hands are up but not doing 2 or 3 gestures
      handleHandZoom(landmarks); 
      return 'OTHER';
    }

    function handleHandZoom(landmarks) {
      const dist = Math.hypot(landmarks[0][4].x - landmarks[0][8].x, landmarks[0][4].y - landmarks[0][8].y);
      targetZoom = Math.min(3.0, Math.max(1.0, 1.0 + (dist - 0.03) * 10));
    }
    
    // --- 3. CORE CAMERA ACTIONS ---
    function executeSnap() {
      if (isShutterCooldown) return;
      isShutterCooldown = true;
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 50);
      takeSnapshot();
      // Brief cooldown before next possible snap
      setTimeout(() => isShutterCooldown = false, 1500); 
    }
    
    function takeSnapshot() {
      const w = video.videoWidth || 640;
      const h = video.videoHeight || 480;
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const cx = c.getContext('2d');
      cx.translate(w, 0); cx.scale(-1, 1);
      cx.drawImage(video, 0, 0, w, h);
      
      const dataUrl = c.toDataURL('image/png');
      const wrapper = document.createElement('div');
      wrapper.className = 'snapshot-item';
      
      const img = document.createElement('img'); img.src = dataUrl;
      const overlay = document.createElement('div'); overlay.className = 'download-overlay';
      overlay.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`;
      
      wrapper.appendChild(img); wrapper.appendChild(overlay);
      wrapper.addEventListener('click', () => {
        const a = document.createElement('a'); a.href = dataUrl; a.download = `Aperture_${Date.now()}.png`;
        a.click();
      });
      
      gallery.prepend(wrapper);
      if (gallery.children.length > 20) gallery.removeChild(gallery.lastChild);
    }
    
    // --- 4. UI RENDERER ---
    function updateUI() {
      let label = '';
      let colorClass = '';
      let cornerColor = 'rgba(255, 255, 255, 0.4)';
      
      if (isShutterCooldown) {
        label = 'CAPTURED'; colorClass = 'alert'; cornerColor = '#ef4444';
      } else if (cameraState === 'COUNTDOWN') {
        const left = Math.ceil(3 - (Date.now() - countdownStart) / 1000);
        label = `ARMING IN ${left}...`; colorClass = 'warning'; cornerColor = '#f59e0b';
      } else if (cameraState === 'ARMED') {
        label = 'NOD TO SNAP'; colorClass = 'active'; cornerColor = '#10b981';
      } else {
        label = 'STANDBY (✌️ TO ARM)'; colorClass = 'standby'; cornerColor = 'rgba(255, 255, 255, 0.1)';
      }

      gestureLabel.textContent = label;
      statusDot.className = `status-dot ${colorClass}`;
      vfCorners.forEach(c => c.style.borderColor = cornerColor);
    }
    
    // --- 5. PREDICTION LOOP ---
    function predictWebcam() {
      currentZoom += (targetZoom - currentZoom) * 0.15;
      video.style.transform = `scaleX(-1) scale(${currentZoom})`;
      
      if (video.currentTime !== lastVideoTime && video.videoWidth > 0 && faceLandmarker && handLandmarker) {
        lastVideoTime = video.currentTime;
        const now = performance.now();
        
        const faceResult = faceLandmarker.detectForVideo(video, now);
        const handResult = handLandmarker.detectForVideo(video, now);
        
        // 1. Process Hands (Highest Priority to dictate State)
        if (handResult.landmarks && handResult.landmarks.length > 0) {
          const gesture = getFingersUpCount(handResult.landmarks);
          
          if (gesture === 'TWO' && cameraState === 'STANDBY') {
            cameraState = 'COUNTDOWN';
            countdownStart = Date.now();
          } else if (gesture === 'THREE') {
            cameraState = 'STANDBY';
          }
        }
        
        // 2. Process State Machine
        if (cameraState === 'COUNTDOWN') {
          const elapsed = Date.now() - countdownStart;
          if (elapsed >= 3000) {
            cameraState = 'ARMED';
          }
        }
        
        // 3. Process Face (Only if armed)
        if (faceResult.faceLandmarks && faceResult.faceLandmarks.length > 0) {
          if (cameraState === 'ARMED') {
            const didNod = detectNod(faceResult.faceLandmarks[0]);
            if (didNod) executeSnap();
          } else {
            pitchHistory = []; // Clear buffer if not armed
          }
        } else {
          pitchHistory = []; // Clear buffer if no face detected
        }
        
        updateUI();
      }
      requestAnimationFrame(predictWebcam);
    }

    // --- 6. VOICE COMMANDS ---
    function initVoiceCommands() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;
      
      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.lang = 'en-US';
      
      recognition.onstart = () => micIcon.classList.add('listening');
      recognition.onerror = () => micIcon.classList.remove('listening');
      
      recognition.onresult = (event) => {
        const last = event.results.length - 1;
        const text = event.results[last][0].transcript.toLowerCase();
        
        if (text.includes('snap') || text.includes('cheese') || text.includes('shoot') || text.includes('capture') || text.includes('photo')) {
          // Voice overrides standby/armed states!
          executeSnap();
        }
      };
      
      recognition.onend = () => {
        // Keep mic alive
        try { recognition.start(); } catch(e){}
      };
      
      try { recognition.start(); } catch(e){}
    }
    
    // --- 7. BOOTUP SEQUENCE ---
    async function bootML() {
      try {
        const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.19/wasm');
        
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
          baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task', delegate: 'CPU' },
          outputFaceBlendshapes: false, runningMode: 'VIDEO', numFaces: 1
        });
        
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task', delegate: 'CPU' },
          runningMode: 'VIDEO', numHands: 1
        });
        
        loader.style.display = 'none';
        requestAnimationFrame(predictWebcam);
        initVoiceCommands();
      } catch (err) {
        document.getElementById('loaderText').textContent = "AI Model Failed";
        document.getElementById('loaderSubtext').textContent = "Please connect to the internet to load ML models.";
      }
    }
    
    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: true });
        video.srcObject = stream;
        await video.play();
        bootML();
      } catch (err) {
        // If auto-play blocked, prompt manual click
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('loaderText').textContent = 'Sensors Paused';
        document.getElementById('loaderSubtext').textContent = 'Please tap below to initialize Camera & Microphone.';
        const btn = document.getElementById('startBtn');
        btn.style.display = 'inline-block';
        btn.addEventListener('click', () => {
          btn.style.display = 'none';
          document.getElementById('spinner').style.display = 'block';
          initCamera();
        });
      }
    }
    
    initCamera();
  </script>
</body>
</html>
