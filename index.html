<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aperture // AI Camera</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #10b981;
      --amber: #f59e0b;
      --red: #ef4444;
      --grey: #9ca3af;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      background: #000000; font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden; height: 100vh; height: 100dvh; width: 100vw;
      color: #ffffff; user-select: none; -webkit-font-smoothing: antialiased;
    }

    .app { display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; }
    .camera-stage { flex: 1; position: relative; background: #000000; overflow: hidden; }
    .camera-viewport { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; }

    #webcam { width: 100%; height: 100%; object-fit: cover; display: block; transform: scaleX(-1); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), filter 0.35s ease; }
    #overlayCanvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; transform: scaleX(-1); z-index: 9; }

    /* Subtle scan grid */
    .scan-grid {
      position: absolute; inset: 0; z-index: 8; pointer-events: none; opacity: 0.5;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
    }

    .viewfinder { position: absolute; inset: 24px; pointer-events: none; z-index: 10; border: 1px solid rgba(255, 255, 255, 0.05); }
    .vf-corner { position: absolute; width: 32px; height: 32px; border-color: rgba(255, 255, 255, 0.4); border-style: solid; transition: border-color 0.3s; }
    .vf-tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .vf-tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .vf-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
    .vf-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    /* Center reticle */
    .reticle {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 180px; height: 180px; z-index: 12; pointer-events: none;
      transition: opacity 0.3s, transform 0.4s cubic-bezier(0.2,0,0,1);
      opacity: 0.25;
    }
    .reticle.locked { opacity: 0.9; transform: translate(-50%, -50%) scale(0.82); }
    .reticle .r-bracket { position: absolute; width: 28px; height: 28px; border: 2px solid var(--grey); transition: border-color 0.3s; }
    .reticle.locked .r-bracket { border-color: var(--green); }
    .r-tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .r-tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .r-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
    .r-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
    .reticle .r-dot {
      position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; border-radius: 50%;
      background: var(--grey); transform: translate(-50%, -50%); transition: background 0.3s, box-shadow 0.3s;
    }
    .reticle.locked .r-dot { background: var(--green); box-shadow: 0 0 10px var(--green); }
    .reticle .r-ring {
      position: absolute; inset: 18px; border-radius: 50%; border: 1px dashed rgba(255,255,255,0.12);
      animation: ringspin 14s linear infinite;
    }
    .reticle.locked .r-ring { border-color: rgba(16,185,129,0.35); }
    @keyframes ringspin { to { transform: rotate(360deg); } }

    #flash-overlay { position: absolute; inset: 0; background: #ffffff; z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
    #flash-overlay.active { opacity: 1; transition: opacity 0.05s ease-out; }

    #centerCountdown {
      position: absolute; z-index: 30; font-size: 180px; font-weight: 800; color: rgba(255, 255, 255, 0.8);
      text-shadow: 0 12px 48px rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center;
      pointer-events: none; animation: popIn 1s infinite cubic-bezier(0.2, 0, 0, 1); font-variant-numeric: tabular-nums;
    }
    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 20% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }

    .top-hud { position: absolute; top: 36px; left: 36px; right: 36px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 25; pointer-events: none; gap: 12px; }
    .glass-panel { pointer-events: auto; background: rgba(15, 15, 20, 0.4); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 100px; padding: 10px 18px; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); white-space: nowrap; }

    .brand { font-weight: 700; font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase; color: #ffffff; flex: 0 0 auto; }
    .brand svg { width: 20px; height: 20px; stroke: #ffffff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex: 0 0 auto; }

    .status-group { display: flex; align-items: center; gap: 10px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4b5563; transition: all 0.3s ease; }
    .status-dot.active { background: var(--green); box-shadow: 0 0 12px rgba(16, 185, 129, 0.6); }
    .status-dot.warning { background: var(--amber); box-shadow: 0 0 12px rgba(245, 158, 11, 0.6); }
    .status-dot.alert { background: var(--red); box-shadow: 0 0 12px rgba(239, 68, 68, 0.6); }
    .status-dot.standby { background: var(--grey); box-shadow: 0 0 12px rgba(156, 163, 175, 0.4); }

    #gestureLabel { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #e5e7eb; font-variant-numeric: tabular-nums; min-width: 52px; text-align: center; white-space: nowrap; }

    /* ---- Telemetry panel (signature element) ---- */
    .telemetry {
      position: absolute; bottom: 150px; left: 36px; z-index: 24; pointer-events: none;
      background: rgba(10, 10, 14, 0.42); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 14px 16px;
      width: 206px; max-width: calc(50vw - 44px); font-family: var(--mono); box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .tel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .tel-title { font-size: 9px; font-weight: 700; letter-spacing: 0.22em; color: rgba(255,255,255,0.45); }
    .tel-live { font-size: 9px; font-weight: 600; letter-spacing: 0.18em; color: var(--green); display: flex; align-items: center; gap: 5px; }
    .tel-live::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

    .tel-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 9px; }
    .tel-row:last-child { margin-bottom: 0; }
    .tel-key { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); white-space: nowrap; flex: 0 0 auto; }
    .tel-val { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; color: #fff; font-variant-numeric: tabular-nums; white-space: nowrap; flex: 0 0 auto; }
    .tel-val.off { color: rgba(255,255,255,0.3); }
    .tel-val.on { color: var(--green); }

    .tel-bar { flex: 1 1 auto; min-width: 24px; height: 6px; border-radius: 4px; background: rgba(255,255,255,0.08); overflow: hidden; position: relative; }
    .tel-bar > i { position: absolute; inset: 0; width: 0%; border-radius: 4px; transition: width 0.08s linear, background 0.2s; }
    .tel-bar + .tel-val { min-width: 36px; text-align: right; }

    /* ---- Voice / audio meter (right side) ---- */
    .voice-hud {
      position: absolute; bottom: 150px; right: 36px; z-index: 24; pointer-events: none;
      background: rgba(10, 10, 14, 0.42); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 14px 16px;
      width: 150px; max-width: calc(50vw - 44px); font-family: var(--mono); box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .voice-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .voice-top .vt-label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; color: rgba(255,255,255,0.45); }
    .mic-icon { display: flex; align-items: center; justify-content: center; opacity: 0.3; transition: all 0.3s; flex: 0 0 auto; }
    .mic-icon svg { width: 14px; height: 14px; stroke: #ffffff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .mic-icon.listening { opacity: 1; filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.8)); }

    .spectrum { display: flex; align-items: flex-end; gap: 3px; height: 36px; margin-bottom: 10px; }
    .spectrum .sbar { flex: 1 1 0; min-width: 0; height: 6%; border-radius: 2px; background: var(--grey); transition: height 0.06s linear, background 0.2s; }
    .spectrum.hot .sbar { background: var(--green); }

    .voice-cmd { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: rgba(255,255,255,0.55); min-height: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .voice-cmd b { color: var(--green); font-weight: 700; }

    /* ---- Settings ---- */
    .hud-right { display: flex; align-items: center; gap: 12px; pointer-events: none; }
    .icon-btn { padding: 11px; border-radius: 50%; cursor: pointer; color: #fff; }
    .icon-btn svg { width: 18px; height: 18px; display: block; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform 0.4s cubic-bezier(0.2,0,0,1); }
    .icon-btn:active { transform: scale(0.92); }
    .icon-btn.open svg { transform: rotate(90deg); }

    .settings-panel {
      position: absolute; top: 92px; right: 36px; z-index: 35; width: 230px; max-height: calc(100dvh - 130px); overflow-y: auto;
      background: rgba(10, 10, 14, 0.6); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 18px; padding: 16px; font-family: var(--mono);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5); scrollbar-width: none;
      opacity: 0; visibility: hidden; transform: translateY(-8px); transition: opacity 0.22s, transform 0.22s, visibility 0.22s; pointer-events: none;
    }
    .settings-panel::-webkit-scrollbar { display: none; }
    .settings-panel.open { opacity: 1; visibility: visible; transform: translateY(0); pointer-events: auto; }
    .settings-title { font-size: 9px; letter-spacing: 0.22em; color: rgba(255,255,255,0.45); font-weight: 700; margin-bottom: 12px; }
    .settings-title:not(:first-child) { margin-top: 18px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 11px; cursor: pointer; }
    .toggle-row:last-child { margin-bottom: 0; }
    .toggle-row .lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; color: #e5e7eb; }
    .switch { position: relative; width: 38px; height: 21px; border-radius: 100px; background: rgba(255,255,255,0.15); transition: background 0.2s; flex: 0 0 auto; }
    .switch.on { background: var(--green); box-shadow: 0 0 12px rgba(16,185,129,0.45); }
    .switch i { position: absolute; top: 3px; left: 3px; width: 15px; height: 15px; border-radius: 50%; background: #fff; transition: transform 0.2s cubic-bezier(0.2,0,0,1); }
    .switch.on i { transform: translateX(17px); }

    /* Individual HUD off switches */
    body.off-telemetry .telemetry,
    body.off-voice .voice-hud,
    body.off-reticle .reticle,
    body.off-viewfinder .viewfinder { display: none; }
    body.off-effects .scan-grid { display: none; }
    body.off-effects .reticle .r-ring { animation: none; opacity: 0; }
    body.off-effects .tel-live::before { animation: none; }
    body.off-effects .spectrum.hot .sbar { background: var(--grey); }

    /* Hand cursor */
    #handCursor {
      position: fixed; top: 0; left: 0; width: 54px; height: 54px; z-index: 60; pointer-events: none;
      transform: translate(-50%, -50%); display: none; will-change: left, top;
    }
    #handCursor.show { display: block; }
    #handCursor .hc-ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid rgba(255,255,255,0.85); box-shadow: 0 0 14px rgba(0,0,0,0.5); transition: transform 0.08s linear; }
    #handCursor .hc-fill { position: absolute; inset: 50%; border-radius: 50%; background: var(--green); transform: translate(-50%, -50%); width: 0; height: 0; transition: width 0.06s linear, height 0.06s linear; }
    #handCursor .hc-dot { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; border-radius: 50%; background: #fff; transform: translate(-50%, -50%); }
    #handCursor.click .hc-ring { transform: scale(0.7); border-color: var(--green); }

    /* Filter name toast */
    #filterToast {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); z-index: 31;
      font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
      color: #fff; padding: 12px 26px; border-radius: 100px; background: rgba(10,10,14,0.5); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 8px 32px rgba(0,0,0,0.4); pointer-events: none;
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
    }
    #filterToast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    .gallery-dock {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); max-width: calc(100vw - 72px); z-index: 25;
      display: flex; gap: 16px; padding: 12px; border-radius: 24px; background: rgba(15, 15, 20, 0.3); backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); overflow-x: auto; scrollbar-width: none; pointer-events: auto;
    }
    .gallery-dock::-webkit-scrollbar { display: none; }
    .gallery-dock:empty { display: none; }

    .snapshot-item { position: relative; flex: 0 0 auto; width: 72px; height: 72px; border-radius: 14px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.15); transition: all 0.3s; background: #000; }
    .snapshot-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .snapshot-item:hover { transform: translateY(-4px); border-color: rgba(255, 255, 255, 0.6); box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4); }
    .snapshot-item:hover img { transform: scale(1.1); }

    .download-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .snapshot-item:hover .download-overlay { opacity: 1; }
    .download-overlay svg { width: 24px; height: 24px; stroke: #ffffff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    #loader { position: fixed; inset: 0; background: #000000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; gap: 24px; }
    .spinner-svg { width: 48px; height: 48px; animation: spin 2s linear infinite; stroke: #ffffff; fill: none; stroke-width: 2; stroke-dasharray: 90 150; stroke-dashoffset: 0; stroke-linecap: round; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    #loaderText { font-size: 16px; font-weight: 600; letter-spacing: 0.15em; color: #ffffff; text-transform: uppercase; margin-bottom: 8px; }
    #loaderSubtext { font-size: 12px; font-weight: 500; color: #9ca3af; letter-spacing: 0.05em; }
    #startBtn { display: none; margin-top: 20px; background: #ffffff; color: #000000; border: none; padding: 12px 24px; border-radius: 100px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: transform 0.2s; }
    #startBtn:active { transform: scale(0.95); }

    @media (max-width: 600px) {
      .viewfinder { inset: 16px; }
      .top-hud { top: 20px; left: 14px; right: 14px; gap: 8px; }
      .glass-panel { padding: 9px 14px; gap: 8px; }
      .brand { font-size: 12px; }
      .brand svg { width: 18px; height: 18px; }
      #gestureLabel { font-size: 12px; min-width: 46px; }
      .icon-btn { padding: 9px; }
      .telemetry { bottom: 124px; left: 14px; width: 160px; padding: 11px 12px; }
      .voice-hud { bottom: 124px; right: 14px; width: 120px; padding: 11px 12px; }
      .settings-panel { top: 74px; right: 14px; width: 204px; }
      .reticle { width: 130px; height: 130px; }
      .gallery-dock { bottom: 22px; padding: 9px; gap: 12px; border-radius: 20px; max-width: calc(100vw - 28px); }
      .snapshot-item { width: 60px; height: 60px; }
      #centerCountdown { font-size: 130px; }
    }

    @media (max-width: 360px) {
      .brand { font-size: 0; }
      .telemetry { width: 148px; }
      .voice-hud { width: 110px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .reticle .r-ring, .tel-live::before { animation: none; }
    }
  </style>
</head>

<body>
  <div id="loader">
    <svg class="spinner-svg" id="spinner" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20"></circle></svg>
    <div style="text-align: center;">
      <div id="loaderText">Initializing Sensors</div>
      <div id="loaderSubtext">Connecting to ML Nodes...</div>
      <button id="startBtn">Tap to Activate</button>
    </div>
  </div>

  <div class="app">
    <div class="camera-stage">
      <div class="viewfinder" id="viewfinder">
        <div class="vf-corner vf-tl"></div><div class="vf-corner vf-tr"></div>
        <div class="vf-corner vf-bl"></div><div class="vf-corner vf-br"></div>
      </div>

      <div class="camera-viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlayCanvas"></canvas>
        <div class="scan-grid"></div>
        <div id="flash-overlay"></div>

        <div class="reticle" id="reticle">
          <div class="r-ring"></div>
          <div class="r-bracket r-tl"></div><div class="r-bracket r-tr"></div>
          <div class="r-bracket r-bl"></div><div class="r-bracket r-br"></div>
          <div class="r-dot"></div>
        </div>

        <div id="centerCountdown">3</div>
        <div class="gallery-dock" id="galleryContainer"></div>

        <div class="top-hud">
          <div class="glass-panel brand">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line></svg>
            APERTURE
          </div>
          <div class="hud-right">
            <div class="glass-panel status-group">
              <span class="status-dot" id="statusDot"></span>
              <span id="gestureLabel">Booting...</span>
            </div>
            <button class="glass-panel icon-btn" id="settingsBtn" aria-label="Settings">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
          </div>
        </div>

        <!-- Settings -->
        <div class="settings-panel" id="settingsPanel">
          <div class="settings-title">DISPLAY</div>
          <div class="toggle-row" data-key="telemetry"><span class="lbl">Telemetry</span><span class="switch on"><i></i></span></div>
          <div class="toggle-row" data-key="voice"><span class="lbl">Voice Meter</span><span class="switch on"><i></i></span></div>
          <div class="toggle-row" data-key="reticle"><span class="lbl">Reticle</span><span class="switch on"><i></i></span></div>
          <div class="toggle-row" data-key="viewfinder"><span class="lbl">Viewfinder</span><span class="switch on"><i></i></span></div>
          <div class="toggle-row" data-key="effects"><span class="lbl">Effects</span><span class="switch on"><i></i></span></div>

          <div class="settings-title">AR &amp; CONTROL</div>
          <div class="toggle-row" data-key="glasses"><span class="lbl">Sunglasses</span><span class="switch"><i></i></span></div>
          <div class="toggle-row" data-key="cap"><span class="lbl">Cap</span><span class="switch"><i></i></span></div>
          <div class="toggle-row" data-key="cursor"><span class="lbl">Hand Cursor</span><span class="switch"><i></i></span></div>
        </div>

        <div id="filterToast">NONE</div>
        <div id="handCursor"><div class="hc-ring"></div><div class="hc-fill"></div><div class="hc-dot"></div></div>

        <!-- Sensor telemetry -->
        <div class="telemetry" id="telemetry">
          <div class="tel-head">
            <span class="tel-title">SENSORS</span>
            <span class="tel-live">LIVE</span>
          </div>
          <div class="tel-row">
            <span class="tel-key">FACE</span>
            <span class="tel-val off" id="telFace">--</span>
          </div>
          <div class="tel-row">
            <span class="tel-key">HAND</span>
            <span class="tel-val off" id="telHand">--</span>
          </div>
          <div class="tel-row">
            <span class="tel-key">PINCH</span>
            <div class="tel-bar"><i id="telNodBar"></i></div>
            <span class="tel-val" id="telNodVal">00%</span>
          </div>
          <div class="tel-row">
            <span class="tel-key">ZOOM</span>
            <span class="tel-val" id="telZoom">1.00x</span>
          </div>
          <div class="tel-row">
            <span class="tel-key">FPS</span>
            <span class="tel-val" id="telFps">--</span>
          </div>
        </div>

        <!-- Voice / audio meter -->
        <div class="voice-hud" id="voiceHud">
          <div class="voice-top">
            <span class="vt-label">VOICE</span>
            <span class="mic-icon" id="micIcon">
              <svg viewBox="0 0 24 24">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="22"></line>
              </svg>
            </span>
          </div>
          <div class="spectrum" id="spectrum"></div>
          <div class="voice-cmd" id="voiceCmd">READY</div>
        </div>

      </div>
    </div>
  </div>

  <script type="module">
    import { FaceLandmarker, HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.19/vision_bundle.mjs";

    const video = document.getElementById('webcam');
    const stage = document.querySelector('.camera-stage');
    const overlay = document.getElementById('overlayCanvas');
    const octx = overlay.getContext('2d');
    const handCursor = document.getElementById('handCursor');
    const filterToast = document.getElementById('filterToast');
    const gallery = document.getElementById('galleryContainer');
    const flash = document.getElementById('flash-overlay');
    const statusDot = document.getElementById('statusDot');
    const gestureLabel = document.getElementById('gestureLabel');
    const centerCountdown = document.getElementById('centerCountdown');
    const micIcon = document.getElementById('micIcon');
    const loader = document.getElementById('loader');
    const vfCorners = document.querySelectorAll('.vf-corner');
    const reticle = document.getElementById('reticle');
    const spectrumEl = document.getElementById('spectrum');
    const voiceCmd = document.getElementById('voiceCmd');

    // Telemetry refs
    const telFace = document.getElementById('telFace');
    const telHand = document.getElementById('telHand');
    const telNodBar = document.getElementById('telNodBar');
    const telNodVal = document.getElementById('telNodVal');
    const telZoom = document.getElementById('telZoom');
    const telFps = document.getElementById('telFps');

    let faceLandmarker = null;
    let handLandmarker = null;
    let lastVideoTime = -1;
    let isShutterCooldown = false;
    let currentZoom = 1.0;
    let targetZoom = 1.0;

    let cameraState = 'STANDBY';
    let armCountdownStart = 0;
    let snapCountdownStart = 0;
    let lastCountNumber = -1;

    const ARM_SECONDS = 3;    // hold-to-arm
    const SNAP_SECONDS = 5;   // photo countdown

    // Feature flags (driven by settings)
    const FX = { telemetry: true, voice: true, reticle: true, viewfinder: true, effects: true, glasses: false, cap: false, cursor: false };

    // Colour filters cycled by swipe
    const FILTERS = [
      { name: 'NONE',  css: 'none' },
      { name: 'MONO',  css: 'grayscale(1) contrast(1.05)' },
      { name: 'NOIR',  css: 'grayscale(1) contrast(1.45) brightness(0.92)' },
      { name: 'SEPIA', css: 'sepia(0.7) contrast(1.05) brightness(1.02)' },
      { name: 'WARM',  css: 'saturate(1.35) sepia(0.18) brightness(1.04)' },
      { name: 'COOL',  css: 'saturate(1.2) hue-rotate(15deg) brightness(1.02)' },
      { name: 'VIVID', css: 'saturate(1.7) contrast(1.12)' },
      { name: 'CYBER', css: 'invert(1) hue-rotate(180deg) saturate(1.3)' }
    ];
    let filterIndex = 0;
    function applyFilter() {
      video.style.filter = FILTERS[filterIndex].css;
      filterToast.textContent = FILTERS[filterIndex].name;
      filterToast.classList.add('show');
      clearTimeout(applyFilter._t);
      applyFilter._t = setTimeout(() => filterToast.classList.remove('show'), 1100);
    }
    function cycleFilter(dir) {
      filterIndex = (filterIndex + dir + FILTERS.length) % FILTERS.length;
      applyFilter();
    }

    // Live telemetry signals
    let faceTracked = false;
    let handTracked = false;
    let pinchSignal = 0;   // 0..1 how closed the pinch is
    let fpsValue = 0;
    let lastFrameStamp = 0;
    let lastFace = null;   // cached face landmarks for AR + snapshot

    // ---------- 1. PINCH + GESTURE DETECTION ----------
    function getDistance(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

    // Pinch ratio = thumb-tip<->index-tip gap normalized by palm length
    // (wrist <-> middle MCP). Distance-invariant: same value near or far.
    const PINCH_ON = 0.60;    // ratio below this = pinched (more sensitive)
    const PINCH_OFF = 0.82;   // ratio above this = released (hysteresis)
    let wasPinched = false;

    function getPinchRatio(landmarks) {
      const lm = landmarks[0];
      const gap = getDistance(lm[4], lm[8]);             // thumb tip -> index tip
      const palm = getDistance(lm[0], lm[9]) || 0.0001;  // wrist -> middle MCP
      return gap / palm;
    }

    function detectPinch(landmarks) {
      const ratio = getPinchRatio(landmarks);
      pinchSignal = Math.max(0, Math.min(1, (PINCH_OFF - ratio) / (PINCH_OFF - PINCH_ON)));
      let fired = false;
      if (!wasPinched && ratio < PINCH_ON) { wasPinched = true; fired = true; }
      else if (wasPinched && ratio > PINCH_OFF) { wasPinched = false; }
      return fired;
    }
    function resetPinch() { wasPinched = false; pinchSignal = 0; }

    // Pose classification (one of POINT / TWO / THREE / OPEN / OTHER)
    function getPose(landmarks) {
      const lm = landmarks[0];
      const up = (tip, pip) => lm[tip].y < lm[pip].y - 0.01; // small margin = snappier
      const i = up(8, 6), m = up(12, 10), r = up(16, 14), p = up(20, 18);
      if (i && !m && !r && !p) return 'POINT';
      if (i && m && !r && !p) return 'TWO';
      if (i && m && r && !p) return 'THREE';
      if (i && m && r && p) return 'OPEN';
      return 'OTHER';
    }

    // STANDBY-only zoom from thumb/index spread (distance-invariant).
    function handlePinchZoom(landmarks) {
      const ratio = getPinchRatio(landmarks);
      targetZoom = Math.min(3.0, Math.max(1.0, 1.0 + (ratio - 0.4) * 2.2));
    }

    // ---------- SWIPE -> colour filters (open palm, fast horizontal move) ----------
    let swipeRef = null;       // { x, t }
    let lastSwipe = 0;
    const SWIPE_DIST = 0.16;   // fraction of frame width
    const SWIPE_TIME = 450;    // ms window
    function handleSwipe(landmarks) {
      const lm = landmarks[0];
      const x = (lm[0].x + lm[9].x) / 2; // palm centre x (source space)
      const now = Date.now();
      if (!swipeRef || now - swipeRef.t > SWIPE_TIME) { swipeRef = { x, t: now }; return; }
      const dx = x - swipeRef.x;
      if (Math.abs(dx) > SWIPE_DIST && now - lastSwipe > 700) {
        lastSwipe = now;
        // source x is mirrored on screen: source-right (dx>0) shows as screen-left
        cycleFilter(dx > 0 ? -1 : 1);
        swipeRef = { x, t: now };
      }
    }
    function resetSwipe() { swipeRef = null; }

    // ---------- HAND CURSOR (point to move, push to click) ----------
    // Map a source-normalized point to viewport coords matching the displayed
    // (cover-cropped, mirrored, zoomed) video so the cursor sits on the fingertip.
    function toScreen(nx, ny) {
      const rect = stage.getBoundingClientRect();
      const W = rect.width, H = rect.height;
      const vw = video.videoWidth || W, vh = video.videoHeight || H;
      const s = Math.max(W / vw, H / vh);
      const dw = vw * s, dh = vh * s;
      const ox = (W - dw) / 2, oy = (H - dh) / 2;
      let x = ox + nx * dw;
      let y = oy + ny * dh;
      x = W - x;                                   // mirror
      x = W / 2 + (x - W / 2) * currentZoom;        // zoom about centre
      y = H / 2 + (y - H / 2) * currentZoom;
      return { x: rect.left + x, y: rect.top + y };
    }

    let cursorActive = false;
    let pushBaseline = null, wasClicking = false;
    const PUSH_TRIGGER = 0.045;   // forward depth delta to register a click
    const PUSH_RELEASE = 0.020;

    function showCursor(landmarks) {
      const lm = landmarks[0];
      const tip = lm[8];
      const pos = toScreen(tip.x, tip.y);
      handCursor.style.left = pos.x + 'px';
      handCursor.style.top = pos.y + 'px';
      handCursor.classList.add('show');
      cursorActive = true;

      // Push detection via relative depth (index tip vs wrist). Forward = more negative z.
      const relZ = lm[8].z - lm[0].z;
      if (pushBaseline === null) pushBaseline = relZ;
      const push = pushBaseline - relZ;            // >0 when pushing toward camera
      const fill = handCursor.querySelector('.hc-fill');
      const pp = Math.max(0, Math.min(1, push / PUSH_TRIGGER));
      fill.style.width = fill.style.height = (pp * 40) + 'px';

      if (!wasClicking && push > PUSH_TRIGGER) {
        wasClicking = true;
        handCursor.classList.add('click');
        clickAt(pos.x, pos.y);
      } else if (wasClicking && push < PUSH_RELEASE) {
        wasClicking = false;
        handCursor.classList.remove('click');
      }
      // drift baseline slowly while not pushing so it self-calibrates
      if (push < PUSH_RELEASE) pushBaseline = pushBaseline * 0.9 + relZ * 0.1;
    }

    function hideCursor() {
      if (!cursorActive) return;
      handCursor.classList.remove('show', 'click');
      cursorActive = false; pushBaseline = null; wasClicking = false;
    }

    function clickAt(x, y) {
      const el = document.elementFromPoint(x, y);
      if (el) el.click();
    }

    // ---------- AR ACCESSORIES (drawn on the cover-aligned overlay canvas) ----------
    function syncOverlay() {
      const vw = video.videoWidth, vh = video.videoHeight;
      if (vw && (overlay.width !== vw || overlay.height !== vh)) { overlay.width = vw; overlay.height = vh; }
    }

    function drawAR(face) {
      octx.clearRect(0, 0, overlay.width, overlay.height);
      if (!face) return;
      const vw = overlay.width, vh = overlay.height;
      if (FX.cap) drawCap(octx, face, vw, vh);
      if (FX.glasses) drawGlasses(octx, face, vw, vh);
    }

    function drawGlasses(ctx, f, vw, vh) {
      const L = f[33], R = f[263];                 // outer eye corners
      const lx = L.x * vw, ly = L.y * vh, rx = R.x * vw, ry = R.y * vh;
      const cx = (lx + rx) / 2, cy = (ly + ry) / 2;
      const eye = Math.hypot(rx - lx, ry - ly);
      const ang = Math.atan2(ry - ly, rx - lx);
      const off = eye * 0.52, lensR = eye * 0.34;
      ctx.save();
      ctx.translate(cx, cy); ctx.rotate(ang);
      ctx.lineWidth = Math.max(3, eye * 0.05);
      ctx.strokeStyle = 'rgba(12,14,20,0.95)';
      ctx.fillStyle = 'rgba(18,22,30,0.5)';
      for (const sgn of [-1, 1]) {
        ctx.beginPath(); ctx.arc(sgn * off, 0, lensR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(-off + lensR, 0); ctx.lineTo(off - lensR, 0); ctx.stroke();         // bridge
      ctx.beginPath(); ctx.moveTo(-off - lensR, -eye * 0.05); ctx.lineTo(-off - lensR - eye * 0.55, -eye * 0.12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(off + lensR, -eye * 0.05); ctx.lineTo(off + lensR + eye * 0.55, -eye * 0.12); ctx.stroke();
      ctx.restore();
    }

    function drawCap(ctx, f, vw, vh) {
      const Lp = f[234], Rp = f[454], top = f[10];
      const lx = Lp.x * vw, ly = Lp.y * vh, rx = Rp.x * vw, ry = Rp.y * vh;
      const faceW = Math.hypot(rx - lx, ry - ly);
      const ang = Math.atan2(ry - ly, rx - lx);
      const tx = top.x * vw, ty = top.y * vh;
      ctx.save();
      ctx.translate(tx, ty); ctx.rotate(ang);
      ctx.fillStyle = 'rgba(22,34,68,0.92)';
      ctx.beginPath(); ctx.ellipse(0, -faceW * 0.16, faceW * 0.56, faceW * 0.46, 0, Math.PI, 0); ctx.fill(); // dome
      ctx.beginPath(); ctx.ellipse(0, -faceW * 0.02, faceW * 0.62, faceW * 0.12, 0, 0, Math.PI * 2); ctx.fill(); // brim
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(0, -faceW * 0.30, faceW * 0.05, 0, Math.PI * 2); ctx.fill(); // button
      ctx.restore();
    }

    // ---------- 3. CAMERA CONTROLS ----------
    function startSnapCountdown() {
      if (cameraState === 'SNAP_COUNTDOWN' || isShutterCooldown) return;
      cameraState = 'SNAP_COUNTDOWN';
      snapCountdownStart = Date.now();
      lastCountNumber = -1;
    }

    function executeSnap() {
      if (isShutterCooldown) return;
      isShutterCooldown = true;
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 50);
      takeSnapshot();
      setTimeout(() => isShutterCooldown = false, 1500);
    }

    function takeSnapshot() {
      const w = video.videoWidth || 640;
      const h = video.videoHeight || 480;
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const cx = c.getContext('2d');
      cx.translate(w, 0); cx.scale(-1, 1);
      cx.filter = FILTERS[filterIndex].css;     // bake colour filter
      cx.drawImage(video, 0, 0, w, h);
      cx.filter = 'none';
      if (FX.glasses || FX.cap) cx.drawImage(overlay, 0, 0, w, h); // bake AR

      const dataUrl = c.toDataURL('image/png');
      const wrapper = document.createElement('div');
      wrapper.className = 'snapshot-item';

      const img = document.createElement('img'); img.src = dataUrl;
      const dlOverlay = document.createElement('div'); dlOverlay.className = 'download-overlay';
      dlOverlay.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`;

      wrapper.appendChild(img); wrapper.appendChild(dlOverlay);
      wrapper.addEventListener('click', () => {
        const a = document.createElement('a'); a.href = dataUrl; a.download = `Aperture_${Date.now()}.png`;
        a.click();
      });

      gallery.prepend(wrapper);
      if (gallery.children.length > 20) gallery.removeChild(gallery.lastChild);
    }

    // ---------- 4. UI RENDERER ----------
    function updateUI() {
      let label = ''; let colorClass = ''; let cornerColor = 'rgba(255, 255, 255, 0.4)';
      centerCountdown.style.display = 'none';

      if (isShutterCooldown) {
        label = 'SHOT'; colorClass = 'alert'; cornerColor = 'var(--red)';
      } else if (cameraState === 'SNAP_COUNTDOWN') {
        const left = Math.ceil(SNAP_SECONDS - (Date.now() - snapCountdownStart) / 1000);
        label = 'SHOOT'; colorClass = 'alert'; cornerColor = 'var(--red)';

        centerCountdown.style.display = 'flex';
        centerCountdown.textContent = left;
        if (left !== lastCountNumber) {
          centerCountdown.style.animation = 'none';
          void centerCountdown.offsetWidth;
          centerCountdown.style.animation = 'popIn 1s infinite cubic-bezier(0.2, 0, 0, 1)';
          lastCountNumber = left;
        }
      } else if (cameraState === 'ARM_COUNTDOWN') {
        const left = Math.ceil(ARM_SECONDS - (Date.now() - armCountdownStart) / 1000);
        label = `ARM ${left}`; colorClass = 'warning'; cornerColor = 'var(--amber)';
      } else if (cameraState === 'ARMED') {
        label = 'PINCH'; colorClass = 'active'; cornerColor = 'var(--green)';
      } else {
        label = 'STANDBY'; colorClass = 'standby'; cornerColor = 'rgba(255, 255, 255, 0.1)';
      }

      gestureLabel.textContent = label;
      statusDot.className = `status-dot ${colorClass}`;
      vfCorners.forEach(c => c.style.borderColor = cornerColor);
    }

    // Telemetry HUD updates run every frame for smoothness
    function renderTelemetry() {
      reticle.classList.toggle('locked', faceTracked);

      telFace.textContent = faceTracked ? 'OK' : '--';
      telFace.className = 'tel-val ' + (faceTracked ? 'on' : 'off');
      telHand.textContent = handTracked ? 'OK' : '--';
      telHand.className = 'tel-val ' + (handTracked ? 'on' : 'off');

      const pct = Math.round(pinchSignal * 100);
      telNodBar.style.width = pct + '%';
      telNodBar.style.background = pinchSignal > 0.85 ? 'var(--green)' : pinchSignal > 0.4 ? 'var(--amber)' : 'var(--grey)';
      telNodVal.textContent = String(pct).padStart(2, '0') + '%';

      telZoom.textContent = currentZoom.toFixed(2) + 'x';
      telFps.textContent = fpsValue ? String(Math.round(fpsValue)) : '--';
    }

    // ---------- 5. PREDICTION LOOP ----------
    function predictWebcam() {
      currentZoom += (targetZoom - currentZoom) * 0.22;   // snappier
      const tf = `scaleX(-1) scale(${currentZoom})`;
      video.style.transform = tf;
      overlay.style.transform = tf;

      if (video.currentTime !== lastVideoTime && video.videoWidth > 0 && faceLandmarker && handLandmarker) {
        lastVideoTime = video.currentTime;
        const now = performance.now();

        // FPS (smoothed)
        if (lastFrameStamp) {
          const inst = 1000 / (now - lastFrameStamp);
          fpsValue = fpsValue ? fpsValue * 0.85 + inst * 0.15 : inst;
        }
        lastFrameStamp = now;

        syncOverlay();
        const faceResult = faceLandmarker.detectForVideo(video, now);
        const handResult = handLandmarker.detectForVideo(video, now);

        // ----- Hands -----
        handTracked = !!(handResult.landmarks && handResult.landmarks.length > 0);
        let pointing = false;

        if (handTracked) {
          const pose = getPose(handResult.landmarks);

          // Hand cursor takes priority while pointing
          if (FX.cursor && pose === 'POINT') {
            pointing = true;
            showCursor(handResult.landmarks);
          } else {
            hideCursor();
          }

          // Swipe filters with an open palm
          if (pose === 'OPEN') handleSwipe(handResult.landmarks);
          else resetSwipe();

          if (!pointing) {
            // Mode switching
            if (pose === 'TWO' && cameraState === 'STANDBY') {
              cameraState = 'ARM_COUNTDOWN';
              armCountdownStart = Date.now();
            } else if (pose === 'THREE') {
              cameraState = 'STANDBY';
              resetPinch();
            }

            if (cameraState === 'STANDBY') {
              if (pose === 'OTHER') handlePinchZoom(handResult.landmarks); // zoom only here
              pinchSignal = 0;
            } else if (cameraState === 'ARMED') {
              if (detectPinch(handResult.landmarks)) startSnapCountdown();  // pinch = shoot
            } else {
              pinchSignal = 0;
            }
          } else {
            pinchSignal = 0;
          }
        } else {
          hideCursor();
          resetSwipe();
          resetPinch();
        }

        // ----- Timers -----
        if (cameraState === 'ARM_COUNTDOWN' && Date.now() - armCountdownStart >= ARM_SECONDS * 1000) {
          cameraState = 'ARMED';
          resetPinch();
        }
        if (cameraState === 'SNAP_COUNTDOWN' && Date.now() - snapCountdownStart >= SNAP_SECONDS * 1000) {
          executeSnap();
          cameraState = 'ARMED';
          resetPinch();
        }

        // ----- Face (framing lock, telemetry, AR) -----
        faceTracked = !!(faceResult.faceLandmarks && faceResult.faceLandmarks.length > 0);
        lastFace = faceTracked ? faceResult.faceLandmarks[0] : null;
        drawAR((FX.glasses || FX.cap) ? lastFace : null);

        updateUI();
      }

      renderTelemetry();
      requestAnimationFrame(predictWebcam);
    }

    // ---------- 6. VOICE COMMANDS (fast / interim) ----------
    const COMMANDS = [
      { keys: ['snap', 'cheese', 'shoot', 'capture', 'take it', 'go'], label: 'CAPTURE', run: () => executeSnap() },
      { keys: ['count', 'timer', 'countdown'], label: 'COUNTDOWN', run: () => startSnapCountdown() },
      { keys: ['zoom in', 'closer'], label: 'ZOOM IN', run: () => targetZoom = Math.min(3.0, targetZoom + 0.5) },
      { keys: ['zoom out', 'back out', 'wider'], label: 'ZOOM OUT', run: () => targetZoom = Math.max(1.0, targetZoom - 0.5) },
      { keys: ['zoom full', 'max zoom', 'full zoom'], label: 'MAX ZOOM', run: () => targetZoom = 3.0 },
      { keys: ['reset zoom', 'zoom reset', 'normal'], label: 'RESET ZOOM', run: () => targetZoom = 1.0 }
    ];

    let lastVoiceFire = 0;
    function handleVoice(text) {
      const now = Date.now();
      if (now - lastVoiceFire < 600) return false; // debounce repeats from interim+final
      for (const cmd of COMMANDS) {
        if (cmd.keys.some(k => text.includes(k))) {
          cmd.run();
          lastVoiceFire = now;
          voiceCmd.innerHTML = `<b>${cmd.label}</b>`;
          clearTimeout(handleVoice._t);
          handleVoice._t = setTimeout(() => { voiceCmd.textContent = 'READY'; }, 1600);
          return true;
        }
      }
      return false;
    }

    function initVoiceCommands() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) { voiceCmd.textContent = 'NO MIC'; return; }

      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;   // act on partial transcripts -> much faster
      recognition.maxAlternatives = 3;     // catch phonetic variants
      recognition.lang = 'en-US';

      recognition.onstart = () => { micIcon.classList.add('listening'); };
      recognition.onerror = () => { micIcon.classList.remove('listening'); };

      recognition.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const res = event.results[i];
          for (let a = 0; a < res.length; a++) {
            if (handleVoice((res[a].transcript || '').toLowerCase().trim())) return;
          }
        }
      };

      recognition.onend = () => {
        micIcon.classList.remove('listening');
        try { recognition.start(); } catch (e) {}
      };
      try { recognition.start(); } catch (e) {}
    }

    // ---------- 7. AUDIO SPECTRUM METER ----------
    const SPECTRUM_BARS = 14;
    const sbars = [];
    for (let i = 0; i < SPECTRUM_BARS; i++) {
      const b = document.createElement('div');
      b.className = 'sbar';
      spectrumEl.appendChild(b);
      sbars.push(b);
    }

    let analyser = null, audioData = null;
    function initAudioMeter(stream) {
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        const ctx = new AC();
        const src = ctx.createMediaStreamSource(stream);
        analyser = ctx.createAnalyser();
        analyser.fftSize = 64;
        analyser.smoothingTimeConstant = 0.7;
        src.connect(analyser);
        audioData = new Uint8Array(analyser.frequencyBinCount);
        if (ctx.state === 'suspended') ctx.resume();
        renderSpectrum();
      } catch (e) {}
    }

    function renderSpectrum() {
      if (analyser && audioData) {
        analyser.getByteFrequencyData(audioData);
        const step = Math.floor(audioData.length / SPECTRUM_BARS) || 1;
        let peak = 0;
        for (let i = 0; i < SPECTRUM_BARS; i++) {
          const v = audioData[i * step] / 255;       // 0..1
          peak = Math.max(peak, v);
          sbars[i].style.height = (6 + v * 94) + '%';
        }
        spectrumEl.classList.toggle('hot', peak > 0.28);
      }
      requestAnimationFrame(renderSpectrum);
    }

    // ---------- SETTINGS ----------
    (function initSettings() {
      const btn = document.getElementById('settingsBtn');
      const panel = document.getElementById('settingsPanel');
      const HUD_KEYS = ['telemetry', 'voice', 'reticle', 'viewfinder', 'effects'];

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        panel.classList.toggle('open');
        btn.classList.toggle('open');
      });

      document.addEventListener('click', (e) => {
        if (!panel.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
          panel.classList.remove('open');
          btn.classList.remove('open');
        }
      });

      function apply(key, on) {
        FX[key] = on;
        if (HUD_KEYS.includes(key)) document.body.classList.toggle('off-' + key, !on);
        if (key === 'cursor' && !on) hideCursor();
        if ((key === 'glasses' || key === 'cap') && !on && !FX.glasses && !FX.cap) {
          octx.clearRect(0, 0, overlay.width, overlay.height);
        }
      }

      panel.querySelectorAll('.toggle-row').forEach((row) => {
        const key = row.dataset.key;
        row.addEventListener('click', () => {
          const on = row.querySelector('.switch').classList.toggle('on');
          apply(key, on);
        });
      });
    })();

    // ---------- 8. BOOTUP ----------
    async function bootML() {
      try {
        const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.19/wasm');

        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
          baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task', delegate: 'CPU' },
          outputFaceBlendshapes: false, runningMode: 'VIDEO', numFaces: 1,
          minFaceDetectionConfidence: 0.3, minFacePresenceConfidence: 0.3, minTrackingConfidence: 0.3
        });

        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task', delegate: 'CPU' },
          runningMode: 'VIDEO', numHands: 1,
          minHandDetectionConfidence: 0.3, minHandPresenceConfidence: 0.3, minTrackingConfidence: 0.3
        });

        loader.style.display = 'none';
        requestAnimationFrame(predictWebcam);
        initVoiceCommands();
      } catch (err) {
        document.getElementById('loaderText').textContent = "AI Model Failed";
        document.getElementById('loaderSubtext').textContent = "Please connect to the internet to load ML models.";
      }
    }

    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: true });
        video.srcObject = stream;
        await video.play();
        initAudioMeter(stream);
        bootML();
      } catch (err) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('loaderText').textContent = 'Sensors Paused';
        document.getElementById('loaderSubtext').textContent = 'Please tap below to initialize Camera & Microphone.';
        const btn = document.getElementById('startBtn');
        btn.style.display = 'inline-block';
        btn.addEventListener('click', () => {
          btn.style.display = 'none';
          document.getElementById('spinner').style.display = 'block';
          initCamera();
        });
      }
    }

    initCamera();
  </script>
